services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: uran
      POSTGRES_USER: uran
      POSTGRES_PASSWORD: uran
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uran -d uran"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    # DATABASE_URL is set here (overrides anything in .env file)
    environment:
      DATABASE_URL: postgresql+asyncpg://uran:uran@db:5432/uran
      SNAPSHOT_SECRET: ${SNAPSHOT_SECRET}
      TEST_MODE: ${TEST_MODE:-false}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # mount source for live reload in dev; remove in prod
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    environment:
      # Points Vite's /api proxy at the backend service name, not localhost
      API_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    # mount source for hot-reload; node_modules stays inside the container
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
